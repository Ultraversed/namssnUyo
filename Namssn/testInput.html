<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="kop.css">
  <title>Welcome to NAMSSN!</title>
  <style>
    .input-box {
      position: relative;
      width: 280px;
      margin: 30px 0;
    }
    
    .input-box input {
      width: 100%;
      padding: 14px 12px;
      font-size: 16px;
      border: 2px solid #555;
      border-radius: 6px;
      outline: none;
      background: transparent;
    }
    
    /* Label (acts as placeholder) */
    .input-box label {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: #777;
      background: #fff;
      padding: 0 6px;
      pointer-events: none;
      transition: 0.3s ease;
    }
    
    /* When input is focused or has value */
    .input-box input:focus + label,
    .input-box input:valid + label {
      top: 0;
      font-size: 13px;
      color: #222;
    }
  </style>
</head>
<body>
<div class="input-box">
  <input type="text" id="username" required />
  <label for="username">Username</label>
</div>

</body>
</html>
